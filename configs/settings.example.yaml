runtime:
  mode: api_only
  max_iterations: 4
  max_runtime_minutes: 25
  max_cost_usd: 5.0

models:
  worker_model: local/fallback-worker
  strong_model: local/fallback-strong
  head_model: ollama/gemma4:e4b
  subagent_model: openrouter/openrouter/free

output:
  default_template: ieee
  supported_templates:
    - ieee
    - acm

retrieval:
  web_provider: scrape
  paper_providers:
    - arxiv
    - semantic_scholar
  allow_metadata_fallback: true
  metadata_fallback_confidence_penalty: 0.15
